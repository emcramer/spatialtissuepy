[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "spatialtissuepy"
version = "0.1.0"
description = "Spatial analysis tools for tissue biology"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.8"
authors = [
    {name = "spatialtissuepy developers"}
]
keywords = [
    "spatial-analysis",
    "tissue-biology",
    "multiplexed-imaging",
    "cell-biology",
    "spatial-statistics",
    "LDA",
    "bioinformatics"
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Topic :: Scientific/Engineering :: Bio-Informatics",
    "Topic :: Scientific/Engineering :: Image Processing",
]
dependencies = [
    "numpy>=1.20",
    "scipy>=1.7",
    "pandas>=1.3",
    "scikit-learn>=1.0",
]

[project.optional-dependencies]
viz = [
    "matplotlib>=3.3",
    "seaborn>=0.11",
]
network = [
    "networkx>=2.6",
]
io = [
    "anndata>=0.8",
    "h5py>=3.0",
]
all = [
    "matplotlib>=3.3",
    "seaborn>=0.11",
    "networkx>=2.6",
    "anndata>=0.8",
    "h5py>=3.0",
]
dev = [
    "pytest>=7.0",
    "pytest-cov>=3.0",
    "black>=22.0",
    "flake8>=4.0",
    "mypy>=0.950",
    "sphinx>=4.0",
    "sphinx-rtd-theme>=1.0",
]

[project.urls]
Homepage = "https://github.com/spatialtissuepy/spatialtissuepy"
Documentation = "https://spatialtissuepy.readthedocs.io"
Repository = "https://github.com/spatialtissuepy/spatialtissuepy"
Issues = "https://github.com/spatialtissuepy/spatialtissuepy/issues"

[tool.setuptools.packages.find]
where = ["."]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[tool.black]
line-length = 88
target-version = ['py38', 'py39', 'py310', 'py311']
include = '\.pyi?$'

[tool.mypy]
python_version = "3.8"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
